<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename= 'css/project.css') }}">
    <title>Project</title>
</head>
<body>
<div class="phone">

    <!-- Tabs -->
    <div class="tabs">
        <a class="tab active" href="#">Project</a>
        <a class="tab" href="#">Ontwerp</a>
        <a class="tab" href="#">Community</a>
    </div>

     <!-- Search -->
    <div class="search-box">
    <form method="GET" action="{{ url_for('projects') }}">
        <input type="text" name="q" placeholder="Search" value="{{ request.args.get('q','') }}">
    </form>
    </div>

    <!-- Images -->
    <div class="gallery">
        {% for project in projects %}
        <a href="{{ url_for('project_detail', project_id=project.id) }}">
            <img src="{{ url_for('static', filename='images/' + project.image) }}">
        </a>
        {% endfor %}
    </div>

</div>
</body>
</html>
