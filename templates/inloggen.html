<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/inloggen.css">
    <title>Inloggen</title>
</head>
<body>
  <div class="phone">
    <h1 class="title">Inloggen</h1>

      <form method="POST" action="{{ url_for('inloggen') }}">
          <div class="form-container">
              <div class="input-field">
                  <label for="email">Email</label>
                  <input name="email" type="email" id="email" placeholder="email" required>
              </div>

              <div class="input-field">
                  <label for="password">Password</label>
                  <input name="password" type="password" id="password" placeholder="wachtwoord" required>
              </div>

              <button type="submit" class="login-btn">INLOGGEN</button>

              {% with messages = get_flashed_messages() %}
              {% if messages %}
              <div class="flash-container">
                  {% for msg in messages %}
                  <div class="alert alert-info">{{ msg }}</div>
                  {% endfor %}
              </div>
              {% endif %}
              {% endwith %}

              <p class="geen-account">Nog geen account? <a href="{{ url_for('registreren') }}">Maak een account</a></p>
              </div>
        </form>
  </div>

</body>
</html>
