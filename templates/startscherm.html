<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename= 'css/startscherm.css') }}">
    <title>Startscherm</title>
</head>
<body>

<div class="phone">
    <header class="topbar">
        <h1 class="title">圆柔</h1>
    </header>

{% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-container">
          {% for msg in messages %}
            <div class="alert alert-info">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <section class="hero">
        <img src="{{ url_for('static', filename='image/kawaii_wool.webp') }}">
    </section>

    <section class="buttons">

        <a class="app-btn" href="{{ url_for('registreren')}}">
            REGISTREREN
        </a>

        <button class="app-btn">
            INLOGGEN
        </button>

    </section>

</div>
</body>
</html>
