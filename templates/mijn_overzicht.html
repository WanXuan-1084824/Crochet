<!DOCTYPE html>                                                                                                                                  
<html lang="nl">                                                                                                                                 
<head>                                                                                                                                           
    <meta charset="UTF-8">                                                                                                                       
    <meta name="viewport" content="width=device-width, initial-scale=1.0">                                                                       
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">                                       
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mijn_overzicht.css') }}">                                                    
    <title>Ontwerp</title>                                                                                                                       
</head>                                                                                                                                          
<body>                                                                                                                                           
<div class="phone">                                                                                                                              
                                                                                                                                                 
    <!-- Tabs -->                                                                                                                                
    <div class="tabs">                                                                                                                           
        <a href="{{ url_for('projects') }}" class="tab">Project</a>                                                                              
        <a href="{{ url_for('mijn_overzicht') }}" class="tab active">Ontwerp</a>                                                                 
        <a href="{{ url_for('questions') }}" class="tab">Community</a>                                                                           
    </div>                                                                                                                                       
                                                                                                                                                 
    <!-- Zoekbalk + New knop -->
<div class="search-bar">
    <form method="GET" action="{{ url_for('mijn_overzicht') }}">
        <div class="search-input">
            <input type="text" name="q" placeholder="Search" value="{{ request.args.get('q','') }}">
            <button type="submit" style="display:none;"></button>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1E1E1E" stroke-width="1.6">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </div>
    </form>
    <a href="{{ url_for('new') }}" class="new-btn">New</a>
</div>
                                                                                                                                                 
    <!-- Cards -->                                                                                                                               
    <div class="cards">                                                                                                                          
        {% for ontwerp in ontwerpen %}                                                                                                           
        <div class="card">                                                                                                                       
            <div class="card-img">                                                                                                               
                {% if ontwerp.image %}                                                                                                           
                <img src="{{ url_for('static', filename='images/' + ontwerp.image) }}" alt="foto">                                               
                {% endif %}                                                                                                                      
            </div>                                                                                                                               
            <div class="card-body">                                                                                                              
                <p class="card-naam">{{ ontwerp.title }}</p>                                                                                     
                <a href="#" class="edit-btn">                                                                                                    
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1E1E1E" stroke-width="1.6"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </a>                                                                                                                             
            </div>                                                                                                                               
        </div>                                                                                                                                   
        {% endfor %}                                                                                                                             
    </div>                                                                                                                                       
                                                                                                                                                 
</div>                                                                                                                                           
</body>                                                                                                                                          
</html>
