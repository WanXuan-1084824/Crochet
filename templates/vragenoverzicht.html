<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/vragenoverzicht.css') }}">
    <title>Community</title>
</head>
<body>
<div class="iphone">

    <!-- Tabs -->
    <div class="tabs">
        <a class="tab" href="{{ url_for('projects') }}" class="tab">Project</a>
        <a class="tab" href="{{ url_for('mijn_overzicht') }}" class="tab">Ontwerp</a>
        <a class="tab active" href="{{ url_for('questions') }}" class="tab active">Community</a>
    </div>

    <!-- Subtabs -->
    <div class="subtabs">
        <a href="{{ url_for('questions') }}" class="subtab">Beantwoorden</a>
        <a href="{{ url_for('vragenoverzicht') }}" class="subtab active">Vragen</a>
    </div>

      <a href="{{ url_for('create') }}" class="new-btn">New</a>

    <!-- Cards -->
    <div class="cards">
        {% for post in posts %}
        <div class="card">
            <div class="card-img">
                {% if post.foto %}
                <img src="{{ url_for('static', filename='images/' + post.foto)}}" alt="foto">
                {% endif %}
            </div>
            <h2 class="card-titel">{{ post.titel }}</h2>
            <p class="card-tekst">{{ post.tekst }}</p>
            <a href="{{ url_for('geantwoord', post_id=post.id) }}" class="answer-btn">Bekijk</a>
        </div>
        {% endfor %}

    </div>

</div>
</body>
</html>
