<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename= 'css/patroon.css') }}">
    <title>{{ project.title }}</title>
</head>

<body>

<div class="iphone">

    <!-- Header -->
    <div class="header">
        <a href="{{ url_for('projects') }}" class="back-btn">Back</a>
    </div>

    <!-- Video -->
    <div class="video">
        <iframe
            src="{{ project.video }}"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Pattern text -->
    <div class="pattern">
        <pre>{{ project.pattern }}</pre>
    </div>

    <!-- Supplies button -->
    <button class="main-btn">Start</button>

</div>

</body>
</html>
